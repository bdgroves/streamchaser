name: Streamchaser

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  chase:
    name: Fetch · Chart · Post
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      USGS_STATION_ID:   "11284400"
      USGS_STATION_NAME: "Big Creek @ Whites Gulch"
      USGS_HASHTAGS:     "#USGS #BigCreek #Groveland"
      POST_TWITTER:      "true"
      POST_BLUESKY:      "true"
      CHART_OUTPUT_DIR:  "/tmp"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install matplotlib numpy requests Pillow tweepy atproto
          pip install -e .

      - name: Run Streamchaser
        env:
          TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python -m streamchaser

      - name: Save chart image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chart-${{ github.run_number }}
          path: /tmp/streamchaser_*.png
          retention-days: 5
